<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhatsApp Bot QR</title>
</head>
<body>
<h1>Scan this QR to login your bot</h1>
<img id="qrcode" />
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const img = document.getElementById("qrcode");
    socket.on("qr", (data) => { img.src = data; });
</script>
</body>
</html>
